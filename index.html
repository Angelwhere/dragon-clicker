  <body class="flex flex-col h-screen">

  </div>

  <button id="upgradeOne" class="active:scale-95" id="warmth">

  <button id="upgradeTwo" class="active:scale-95" id:="Affection">

  </button>


  <button id="upgradeThree" class="active:scale-95" id="Soothe">
<img src="/src/assets/speech.png" class="w-75">
<p id="upgradeThreeCount">Soothe</p>
<p>Cost:10000</p>

 </main>
    
 <div id="app"></div>
